<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="420" viewBox="0 0 1800 420" fill="none">
  <defs>
    <style>
      .purple { fill: #2F238B; }
      .purple-stroke { stroke: #2F238B; }
      .orange { fill: #F39A17; }
      .orange-stroke { stroke: #F39A17; }
      .word { font-family: Arial, Helvetica, sans-serif; font-weight: 900; font-size: 160px; letter-spacing: 2px; fill: #2F238B; }
    </style>
  </defs>

  <!-- Transparent background -->

  <!-- Icon block -->
  <g transform="translate(30,40)">
    <!-- outer square -->
    <rect x="0" y="0" width="260" height="260" fill="none" stroke="#2F238B" stroke-width="18"/>

    <!-- big C -->
    <path d="M178 60
             C158 46, 133 38, 105 38
             C53 38, 22 76, 22 130
             C22 184, 53 222, 105 222
             C133 222, 158 214, 178 200
             L178 164
             C162 178, 142 186, 118 186
             C76 186, 56 164, 56 130
             C56 96, 76 74, 118 74
             C142 74, 162 82, 178 96 Z" fill="#2F238B"/>

    <!-- dashboard panel -->
    <g transform="translate(56,78)">
      <rect x="0" y="22" width="132" height="72" rx="12" fill="white"/>
      <line x1="0" y1="22" x2="132" y2="22" stroke="#2F238B" stroke-width="8" stroke-linecap="round"/>
      <circle cx="20" cy="0" r="7" fill="#2F238B"/>
      <circle cx="43" cy="0" r="7" fill="#2F238B"/>
      <circle cx="66" cy="0" r="7" fill="#2F238B"/>

      <rect x="18" y="42" width="12" height="35" rx="2" fill="#2F238B"/>
      <rect x="38" y="28" width="12" height="49" rx="2" fill="#2F238B"/>
      <rect x="58" y="16" width="12" height="61" rx="2" fill="#2F238B"/>

      <rect x="86" y="36" width="42" height="8" rx="4" fill="#2F238B"/>
      <rect x="86" y="56" width="52" height="8" rx="4" fill="#2F238B"/>
      <rect x="86" y="76" width="36" height="8" rx="4" fill="#2F238B"/>
    </g>

    <!-- orange service dot -->
    <circle cx="200" cy="130" r="28" fill="#F39A17" stroke="white" stroke-width="6"/>
  </g>

  <!-- Wordmark, sized to match icon height visually -->
  <text x="345" y="228" class="word">CECHSERVICES</text>

  <!-- underline -->
  <line x1="352" y1="316" x2="1710" y2="316" stroke="#F39A17" stroke-width="8" stroke-linecap="round"/>
</svg>
