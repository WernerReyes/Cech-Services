<div class="min-h-screen xl:flex">
  <div>
    
    <!-- <app-sidebar-variants-demo></app-sidebar-variants-demo> -->
     <app-sidebar></app-sidebar>
    <app-backdrop></app-backdrop>
  </div>
  <div
      class="flex-1 transition-all duration-300 ease-in-out"
      [ngClass]="{
        'xl:ml-[290px]': isExpanded() || isHovered(),
        'xl:ml-[90px]': !isExpanded() && !isHovered(),
        'ml-0': isMobileOpen()
      }"
  >
    <!-- app header start -->
    <app-header/>
    <!-- app header end -->
    <div class="p-4 mx-auto  md:p-6">
      <router-outlet></router-outlet>
    </div>
  </div>
</div>
