<button
  type="button"
  [ngClass]="
    'inline-flex items-center justify-center gap-2 rounded-lg transition ' +
    className() + ' ' +
    sizeClasses + ' ' +
    variantClasses + ' ' +
    disabledClasses
  "
  [disabled]="disabled()"
  (click)="onClick($event)"
>
  @if (startIcon(); as icon) {
  <span class="flex items-center" [innerHTML]="icon | safeHtml"></span>
  }
  <ng-content></ng-content>
  @if (endIcon(); as icon) {
  <span class="flex items-center" [innerHTML]="icon | safeHtml"></span>
  }
</button>
