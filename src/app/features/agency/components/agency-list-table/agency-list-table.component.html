<div class="overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-sm">
  <!-- Header superior -->
  <div
    class="flex flex-col gap-4 border-b border-slate-200 bg-slate-50/80 px-4 py-4 sm:flex-row sm:items-center sm:justify-between"
  >
    <div class="flex items-start gap-3">
      <div
        class="flex size-11 shrink-0 items-center justify-center rounded-xl bg-primary-50 text-primary-600"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="size-5"
          fill="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            d="M20 6h-4V4c0-1.1-.9-2-2-2H4c-1.1 0-2 .9-2 2v17c0 .55.45 1 1 1h18c.55 0 1-.45 1-1V8c0-1.1-.9-2-2-2m0 14H4V4h10v3c0 .55.45 1 1 1h5z"
          ></path>
          <path
            d="M10 6h2v2h-2zM6 6h2v2H6zm0 4h2v2H6zm4 0h2v2h-2zm6 0h2v2h-2zm-6 4h2v2h-2zm-4 0h2v2H6zm10 0h2v2h-2z"
          ></path>
        </svg>
      </div>

      <div>
        <h2 class="text-base font-bold text-slate-800">
          Agencias
        </h2>

        <p class="mt-1 text-sm text-slate-500">
          Consulta las agencias registradas, su ubicación y banco asociado.
        </p>
      </div>
    </div>

    <!-- Buscador -->
    <div class="w-full sm:w-96">
      <p-iconfield iconPosition="left" class="w-full">
        <p-inputicon>
          <i class="pi pi-search text-slate-400"></i>
        </p-inputicon>

        <input
          pInputText
          type="text"
          pSize="large"
          class="w-full rounded-xl border-slate-200 bg-white text-sm shadow-sm placeholder:text-slate-400 focus:border-primary-400 focus:ring-primary-400"
          placeholder="Buscar agencia, banco, dirección..."
          (input)="dt.filterGlobal($any($event.target).value, 'contains')"
        />
      </p-iconfield>
    </div>
  </div>

  <!-- Tabla -->
  <p-table
    #dt
    [value]="agencies()"
    /* [loading]="agencies.isLoading()" */
    [tableStyle]="{
      'min-width': '72rem',
      'table-layout': 'fixed'
    }"
    paginator
    [globalFilterFields]="[
      'idAgencia',
      'agencia',
      'direccion',
      'cliente.valor',
      'departamento.valor',
      'provincia.valor',
      'distrito.valor',
      'zona.valor',
      'ubicacion.valor',
      'empresa.valor'
    ]"
    dataKey="idAgencia"
    paginatorTemplate="CurrentPageReport FirstPageLink PrevPageLink PageLinks NextPageLink LastPageLink RowsPerPageDropdown"
    [rows]="10"
    [reorderableColumns]="true"
    [rowsPerPageOptions]="[10, 20, 50, 100]"
    [showCurrentPageReport]="true"
    currentPageReportTemplate="Mostrando del {first} al {last} de {totalRecords} agencias"
    styleClass="cech-agency-table"
  >
    <!-- Header -->
    <ng-template #header>
      <tr>
        <th
          pSortableColumn="idAgencia"
          class="w-[5.5rem] bg-white px-4 py-3 text-xs font-bold uppercase tracking-wide text-slate-500"
        >
          <div class="flex items-center gap-2">
            ID
            <p-sort-icon field="idAgencia" />
          </div>
        </th>

        <th
          pSortableColumn="agencia"
          class="w-[28rem] bg-white px-4 py-3 text-xs font-bold uppercase tracking-wide text-slate-500"
        >
          <div class="flex items-center gap-2">
            Agencia
            <p-sort-icon field="agencia" />
          </div>
        </th>

        

        <th
          class="w-36 bg-white px-4 py-3 text-right text-xs font-bold uppercase tracking-wide text-slate-500"
        >
          Acción
        </th>
      </tr>
    </ng-template>

    <!-- Empty -->
    <ng-template #emptymessage>
      <tr>
        <td colspan="8">
          <div
            class="flex flex-col items-center justify-center px-6 py-14 text-center"
          >
            <div
              class="mb-3 flex size-14 items-center justify-center rounded-full bg-slate-100 text-slate-400"
            >
              <i class="pi pi-building text-xl"></i>
            </div>

            <p class="text-sm font-semibold text-slate-700">
              No se encontraron agencias
            </p>

            <p class="mt-1 text-sm text-slate-500">
              Intenta buscar por otro nombre, cliente, dirección o ubicación.
            </p>
          </div>
        </td>
      </tr>
    </ng-template>

    <!-- Body -->
    <ng-template #body let-agency>
      <tr class="transition-colors hover:bg-slate-50">
        <!-- ID -->
        <td class="px-4 py-3 align-top">
          <span
            class="inline-flex rounded-lg bg-slate-100 px-2.5 py-1 text-xs font-bold text-slate-700"
          >
            #{{ agency.id }}
          </span>
        </td>

        <!-- Agencia -->
        <td class="px-4 py-3 align-top">
          <div class="flex min-w-0 items-start gap-3">
            <div
              class="flex size-10 shrink-0 items-center justify-center rounded-xl bg-primary-50 text-primary-600"
            >
              <i class="pi pi-building text-base"></i>
            </div>

            <div class="min-w-0 max-w-[22rem] flex-1">
              <p
                class="whitespace-normal break-words text-sm font-semibold leading-5 text-slate-800 [overflow-wrap:anywhere]"
              >
                {{ agency.valor }}
              </p>

             
            </div>
          </div>
        </td>

       

        <!-- Acción -->
        <td class="px-4 py-3 text-right align-top">
          <button
            pButton
            type="button"
            (click)="viewMachines(agency)"
            [outlined]="true"
            class="inline-flex h-9 items-center gap-2 rounded-xl border-primary-200 px-3 text-sm font-semibold text-primary-600 transition hover:bg-primary-50"
          >
           <svg xmlns="http://w3.org" viewBox="0 0 24 24" width="100%" height="100%">
  <!-- Cuerpo principal de la máquina -->
  <path d="M3 6a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Pantalla digital de conteo -->
  <rect x="6" y="7" width="6" height="4" rx="1" fill="none" stroke="currentColor" stroke-width="2"/>
  <line x1="8" y1="9" x2="10" y2="9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- Botones de control de la máquina -->
  <circle cx="15.5" cy="8" r="1" fill="currentColor"/>
  <circle cx="18" cy="8" r="1" fill="currentColor"/>
  <circle cx="15.5" cy="10" r="1" fill="currentColor"/>
  <circle cx="18" cy="10" r="1" fill="currentColor"/>
  
  <!-- Ranura de salida y rodillo interno -->
  <path d="M6 14h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  <circle cx="7.5" cy="14" r="1" fill="currentColor"/>
  <circle cx="16.5" cy="14" r="1" fill="currentColor"/>
  
  <!-- Billetes saliendo / apilados en la tolva -->
  <path d="M5 17h14v2H5z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M7 17v-1.5a0.5 0 0 1 0.5-.5h9a0.5 0 0 1 0.5 0.5V17" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
</svg>

            <span>Ver Equipos</span>
          </button>
        </td>
      </tr>
    </ng-template>
  </p-table>
</div>
