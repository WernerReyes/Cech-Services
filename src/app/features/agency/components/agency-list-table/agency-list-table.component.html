<div class=" rounded-2xl border border-slate-200 bg-white">
  <!-- Header superior -->
  <div
    class="flex flex-col gap-4 border-b border-slate-200 bg-slate-50/80 px-4 py-4 sm:flex-row sm:items-center sm:justify-between"
  >
    

    <!-- Buscador -->
    <div class="w-full sm:w-96 ml-auto">
      <p-iconfield iconPosition="left" class="w-full">
        <p-inputicon>
          <i class="pi pi-search text-slate-400"></i>
        </p-inputicon>

        <input
          pInputText
          type="text"
          pSize="large"
          class="w-full rounded-xl border-slate-200 bg-white text-sm shadow-sm placeholder:text-slate-400 focus:border-primary-400 focus:ring-primary-400"
          placeholder="Buscar agencia..."
          (input)="dt.filterGlobal($any($event.target).value, 'contains')"
        />
      </p-iconfield>
    </div>
  </div>

  <!-- Tabla -->
  <p-table
    #dt
    [value]="agencies()"
    /* [loading]="agencies.isLoading()" */
    [tableStyle]="{
      'min-width': '72rem',
      'table-layout': 'fixed'
    }"
    paginator
    [globalFilterFields]="[
      'id',
      'valor',
    ]"
    dataKey="idAgencia"
    paginatorTemplate="CurrentPageReport FirstPageLink PrevPageLink PageLinks NextPageLink LastPageLink RowsPerPageDropdown"
    [rows]="10"
    [reorderableColumns]="true"
    [rowsPerPageOptions]="[10, 20, 50, 100]"
    [showCurrentPageReport]="true"
    currentPageReportTemplate="Mostrando del {first} al {last} de {totalRecords} agencias"
    styleClass="cech-agency-table"
  >
    <!-- Header -->
    <ng-template #header>
      <tr>
        <th
          pSortableColumn="idAgencia"
          class="w-22 bg-white px-4 py-3 text-xs font-bold uppercase tracking-wide text-slate-500"
        >
          <div class="flex items-center gap-2">
            ID
            <p-sort-icon field="idAgencia" />
          </div>
        </th>

        <th
          pSortableColumn="agencia"
          class="w-md bg-white px-4 py-3 text-xs font-bold uppercase tracking-wide text-slate-500"
        >
          <div class="flex items-center gap-2">
            Agencia
            <p-sort-icon field="agencia" />
          </div>
        </th>

        

        <th
          class="w-36 bg-white px-4 py-3 text-right text-xs font-bold uppercase tracking-wide text-slate-500"
        >
          Acción
        </th>
      </tr>
    </ng-template>

    <!-- Empty -->
    <ng-template #emptymessage>
      <tr>
        <td colspan="3">
          <div
            class="flex flex-col items-center justify-center px-6 py-14 text-center"
          >
            <div
              class="mb-3 flex size-14 items-center justify-center rounded-full bg-slate-100 text-slate-400"
            >
             <i class="pi pi-building text-2xl!"></i>
            </div>

            <p class="text-sm font-semibold text-slate-700">
              No se encontraron agencias
            </p>

            <p class="mt-1 text-sm text-slate-500">
              Intenta buscar por otro nombre
            </p>
          </div>
        </td>
      </tr>
    </ng-template>

    <!-- Body -->
    <ng-template #body let-agency>
      <tr class="transition-colors hover:bg-slate-50">
        <!-- ID -->
        <td class="px-4 py-3 align-top">
          <span
            class="inline-flex rounded-lg bg-slate-100 px-2.5 py-1 text-xs font-bold text-slate-700"
          >
            #{{ agency.id }}
          </span>
        </td>

        <!-- Agencia -->
        <td class="px-4 py-3 align-top">
          <div class="flex min-w-0 items-start gap-3">
          
            <div class="min-w-0 max-w-88 flex-1">
              <p
                class="whitespace-normal break-wrap-break-word text-sm font-semibold leading-5 text-slate-800"
              >
                {{ agency.valor }}
              </p>

             
            </div>
          </div>
        </td>

       

        <!-- Acción -->
        <td class="px-4 py-3 text-right align-top">
          <button
        
            pButton
            type="button"
            (click)="viewMachines(agency)"
            
            [outlined]="true"
            class="inline-flex h-9 items-center gap-2 rounded-xl border-primary-200 px-3 text-sm font-semibold text-primary-600 transition hover:bg-primary-50"
          >
           <i class="pi pi-eye text-lg"></i>
            <span>Ver Equipos</span>
          </button>
        
        </td>
      </tr>
    </ng-template>
  </p-table>
</div>
