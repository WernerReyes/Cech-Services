<main class="min-h-screen bg-[#f5f6f8] text-gray-900 dark:bg-gray-950 dark:text-white">
  <div class="grid min-h-screen lg:grid-cols-[minmax(0,0.9fr)_minmax(0,1.1fr)]">
    <section
      class="relative flex min-h-screen items-center justify-center overflow-hidden px-5 py-10 sm:px-8 lg:px-12"
    >
      <div
        class="absolute inset-0 bg-[radial-gradient(circle_at_15%_15%,rgba(230,32,23,0.12),transparent_30%),linear-gradient(180deg,#ffffff_0%,#f6f7fb_100%)] dark:bg-[radial-gradient(circle_at_15%_15%,rgba(230,32,23,0.2),transparent_32%),linear-gradient(180deg,#101828_0%,#030712_100%)]"
      ></div>
      <div class="relative z-10 flex w-full justify-center">
        <ng-content></ng-content>
      </div>
    </section>

    <aside class="relative hidden min-h-screen overflow-hidden lg:block">
      <img
        src="/images/auth/scotiabank-login-hero.png"
        alt="Scotiabank banking lobby"
        class="absolute inset-0 h-full w-full object-cover"
      />
      <div
        class="absolute inset-0 bg-[linear-gradient(90deg,rgba(10,15,25,0.86)_0%,rgba(10,15,25,0.42)_38%,rgba(122,8,5,0.1)_100%)]"
      ></div>
      <div class="absolute inset-x-0 top-0 h-40 bg-gradient-to-b from-black/50 to-transparent"></div>
      <div class="absolute inset-x-0 bottom-0 h-56 bg-gradient-to-t from-black/75 to-transparent"></div>

      <div class="relative z-10 flex min-h-screen flex-col p-10 2xl:p-14">
        <a routerLink="/" class="inline-flex items-center gap-3 self-start text-white">
          <span
            class="flex size-11 items-center justify-center rounded-lg bg-[#e62017] text-xl font-semibold shadow-lg shadow-black/20"
            aria-hidden="true"
          >
            S
          </span>
          <span class="text-lg font-semibold tracking-wide">Scotiabank</span>
        </a>

        <div class="mb-40 mt-auto max-w-[390px] 2xl:mb-48">
          <p class="mb-4 text-sm font-medium uppercase tracking-[0.22em] text-white/70">
            Banca empresarial
          </p>
          <h2 class="text-2xl font-semibold leading-tight text-white 2xl:text-4xl">
            Gestiona tus operaciones con una experiencia segura y moderna.
          </h2>
        </div>
      </div>
    </aside>
  </div>

  <div class="fixed bottom-5 right-5 z-50 hidden sm:block">
    <app-theme-toggle-two />
  </div>
</main>
