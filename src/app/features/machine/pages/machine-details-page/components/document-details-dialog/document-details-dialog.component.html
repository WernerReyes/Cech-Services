<p-dialog
  [(visible)]="visible"
  [modal]="true"
  [style]="{ width: '90vw', height: '90vh' }"
  [closable]="true"
  [dismissableMask]="true"
  [baseZIndex]="100000000"
>
  <ng-template #header>
    <h2 class="text-lg font-semibold">Detalles del documento</h2>
  </ng-template>
  <ng-template #content>
    <div class="flex flex-col gap-4 h-full">
      @if (url()) {
        <iframe
          [src]="url() | safeUrl"
          width="100%"
          height="100%"
        ></iframe>
      } @else {
        <p>No se ha proporcionado una URL para el documento.</p>
      }
    </div>
  </ng-template>
  <ng-template #footer>
    <button pButton type="button" (click)="visible.set(false)">Cerrar</button>
  </ng-template>
</p-dialog>
